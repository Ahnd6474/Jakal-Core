name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-release:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install packaging tools
        run: choco install ninja nsis --no-progress -y

      - name: Configure ZIP package build
        run: cmake -S . -B build_ninja -G Ninja -DJAKAL_CORE_BUILD_TESTS=OFF

      - name: Build ZIP package
        run: cmake --build build_ninja --target package

      - name: Write ZIP checksums
        run: |
          $zipArtifacts = Get-ChildItem -Path .\build_ninja\dist -File -Filter *.zip -ErrorAction Stop
          foreach ($artifact in $zipArtifacts) {
              powershell -ExecutionPolicy Bypass -File .\packaging\sign-and-verify-artifact.ps1 `
                -ArtifactPath $artifact.FullName `
                -WriteChecksum `
                -VerifyChecksum
          }

      - name: Build NSIS package
        run: |
          $makensis = (Get-Command makensis.exe -ErrorAction Stop).Source
          powershell -ExecutionPolicy Bypass -File .\packaging\build-nsis-package.ps1 `
            -BuildDir build_ninja `
            -OutputDir .\build_ninja\dist-nsis `
            -MakensisPath $makensis

      - name: Smoke packaged layout
        run: |
          powershell -ExecutionPolicy Bypass -File .\packaging\package-smoke.ps1 `
            -BuildDir build_ninja

      - name: Collect release assets
        run: |
          New-Item -ItemType Directory -Force -Path .\release-assets | Out-Null
          Copy-Item .\build_ninja\dist\*.zip .\release-assets\
          Copy-Item .\build_ninja\dist\*.zip.sha256 .\release-assets\
          Copy-Item .\build_ninja\dist-nsis\*.exe .\release-assets\
          Copy-Item .\build_ninja\dist-nsis\*.exe.sha256 .\release-assets\

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-assets
          path: release-assets/*
          if-no-files-found: error

      - name: Publish draft GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release-assets/*
