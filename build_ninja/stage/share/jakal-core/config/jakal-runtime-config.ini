[runtime]
# Writable runtime home. If unset, Jakal uses the platform-local state directory.
# home=

[paths]
# Override these only when embedding Jakal into another product.
# planner_cache=
# execution_cache=
# telemetry=

[backends]
host=1
opencl=1
level_zero=1
vulkan_probe=1
vulkan_status=1
cuda=1
rocm=1
prefer_level_zero_over_opencl=1

[doctor]
# When set, doctor/smoke commands limit execution to the host backend.
host_only=0
